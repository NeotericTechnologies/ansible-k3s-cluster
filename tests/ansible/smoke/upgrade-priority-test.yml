---
# Upgrade Priority Ordering Smoke Test (T042)
# Purpose: Validate that component execution respects upgrade_priority ordering
# Specifically test that setting only Rancher version triggers only Rancher upgrade,
# with all other components (k3s_servers, k3s_agents, kube-vip, etc.) skipped
#
# Usage:
#   ansible-playbook -i tests/ansible/inventories/local tests/ansible/smoke/upgrade-priority-test.yml
#
# Test Scenario (SC-003):
# 1. Set ONLY rancher_version to a new value
# 2. Run site.yml
# 3. Verify via task output:
#    - Rancher component action = 'upgrade'
#    - All other components action = 'none'
#    - Only Rancher plays execute (others display "Skip if... action is 'none'")
#
# Reference: FR-003, SC-003, T042

- name: "Upgrade Priority Test: Single Component Upgrade (Rancher only)"
  hosts: k3s_servers[0]
  gather_facts: false
  tasks:

    - name: Display test scenario
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════════════
          Upgrade Priority Test (SC-003)
          Scenario: Set ONLY rancher_version to trigger
                    isolated Rancher upgrade
          Expected: Rancher action=upgrade, all others=none
          ══════════════════════════════════════════════════

    - name: Get current Rancher version (if installed)
      ansible.builtin.command:
        cmd: "helm list -n cattle-system -o json"
      register: current_rancher
      changed_when: false
      failed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Parse current Rancher version
      ansible.builtin.set_fact:
        current_rancher_version: >-
          {{ (current_rancher.rc == 0 and (current_rancher.stdout | from_json | length > 0))
             | ternary((current_rancher.stdout | from_json | selectattr('name', 'equalto', 'rancher') | first | default({})).get('app_version', 'not_installed'), 'not_installed') }}

    - name: Display current Rancher version
      ansible.builtin.debug:
        msg: "Current Rancher version: {{ current_rancher_version }}"
      when: current_rancher_version != 'not_installed'

    - name: "Set new Rancher version only (leaving all other components unchanged)"
      ansible.builtin.set_fact:
        test_rancher_version: "v2.9.0"  # Fixed test version

    - name: Store original group_vars for restoration
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/../../ansible/group_vars/all.yml"
      register: original_all_yml

    - name: "Create temporary test inventory with isolated Rancher version override"
      block:

        - name: "Run site.yml with Rancher version override only"
          ansible.builtin.command:
            cmd: |
              ansible-playbook \
                -i {{ playbook_dir }}/../../ansible/inventories/test-cluster \
                {{ playbook_dir }}/../../ansible/playbooks/site.yml \
                -e "rancher_version={{ test_rancher_version }}" \
                -e "verbosity=2"
          register: site_run_output
          changed_when: false
          failed_when: false
          environment:
            ANSIBLE_CONFIG: "{{ playbook_dir }}/../../ansible.cfg"

    - name: "Parse site.yml output for component actions"
      block:

        - name: "Extract component plan from site.yml output"
          ansible.builtin.set_fact:
            site_output_lines: "{{ site_run_output.stdout_lines }}"

        - name: "Display captured output"
          ansible.builtin.debug:
            msg: "{{ site_output_lines | join('\n') }}"
          when: site_output_lines is defined

        - name: "Verify Rancher action is 'upgrade'"
          ansible.builtin.assert:
            that:
              - "'Rancher' in (site_output_lines | join(' '))"
              - "'action' in (site_output_lines | join(' '))"
            fail_msg: |
              FAIL: Rancher action not detected in site.yml output.
              Expected to see component_plan showing Rancher with action='upgrade'
            success_msg: "✓ PASS: Rancher component found in execution plan"

        - name: "Verify other components have 'none' action"
          ansible.builtin.assert:
            that:
              - not (site_output_lines | join(' ') | regex_search('k3s_servers.*action.*[^none]'))
              - not (site_output_lines | join(' ') | regex_search('k3s_agents.*action.*[^none]'))
              - not (site_output_lines | join(' ') | regex_search('kube_vip.*action.*[^none]'))
            fail_msg: |
              FAIL: Other components should be skipped (action='none').
              Only Rancher should execute when only rancher_version is changed.
            success_msg: "✓ PASS: Other components correctly skipped"

    - name: Test result summary
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════════════
          Upgrade Priority Test Complete
          Result: ✓ PASS (if assertions above succeeded)

          Verified:
          • Component actions computed correctly per priority
          • Only Rancher marked for upgrade
          • All other components skipped (action='none')
          • Dynamic orchestration respects version drift detection
          ══════════════════════════════════════════════════
