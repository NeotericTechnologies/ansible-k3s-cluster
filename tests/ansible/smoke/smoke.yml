---
# Smoke Test Playbook
# Purpose: Basic smoke tests for k3s cluster validation
# Usage: ansible-playbook -i tests/ansible/inventories/local tests/ansible/smoke/smoke.yml

- name: k3s Cluster Smoke Tests
  hosts: k3s_servers[0]
  gather_facts: true
  tasks:
    - name: Load shared cluster defaults used by smoke assertions
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../../ansible/group_vars/all.yml"
        name: smoke_defaults

    - name: Check if k3s is installed
      ansible.builtin.command: k3s --version
      register: k3s_version_output
      changed_when: false
      failed_when: false

    - name: Report k3s version
      ansible.builtin.debug:
        msg: "k3s version: {{ k3s_version_output.stdout }}"
      when: k3s_version_output.rc == 0

    - name: Check if k3s service is running
      ansible.builtin.systemd:
        name: k3s
        state: started
      check_mode: true
      register: k3s_service_status

    - name: Verify kubectl is available
      ansible.builtin.command: kubectl version --client
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: kubectl_version
      changed_when: false
      failed_when: false

    - name: Get cluster nodes
      ansible.builtin.command: kubectl get nodes -o wide
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: kubectl_nodes
      changed_when: false
      failed_when: false

    - name: Display cluster nodes
      ansible.builtin.debug:
        var: kubectl_nodes.stdout_lines
      when: kubectl_nodes.rc == 0

    - name: Check control-plane VIP reachability
      ansible.builtin.wait_for:
        host: "{{ control_plane_vip }}"
        port: "{{ api_port }}"
        timeout: 5
      when: control_plane_vip is defined

    - name: Compute topology classification for smoke validation
      ansible.builtin.set_fact:
        smoke_server_count: "{{ groups['k3s_servers'] | default([]) | length }}"
        smoke_is_ha: "{{ (groups['k3s_servers'] | default([]) | length) >= 3 }}"

    - name: Verify HA targets are defined for enabled components
      ansible.builtin.assert:
        that:
          - smoke_defaults.k3s_server_ha_min_replicas | default(0) | int >= 1
          - smoke_defaults.kube_vip_ha_min_replicas | default(0) | int >= 1
          - smoke_defaults.traefik_ha_min_replicas | default(0) | int >= 1
        fail_msg: "Required HA target variables are missing or invalid"

    - name: Validate non-HA preservation branch behavior
      ansible.builtin.assert:
        that:
          - smoke_defaults.k3s_server_non_ha_default_replicas | default(0) | int >= 1
          - smoke_defaults.kube_vip_non_ha_default_replicas | default(0) | int >= 1
          - smoke_defaults.traefik_non_ha_default_replicas | default(0) | int >= 1
        fail_msg: "Required non-HA default target variables are missing or invalid"

    - name: Display topology-specific smoke context
      ansible.builtin.debug:
        msg:
          - "Topology server count: {{ smoke_server_count }}"
          - "HA topology enabled: {{ smoke_is_ha }}"
          - "Expected traefik target: {{ (smoke_defaults.traefik_ha_min_replicas if smoke_is_ha else smoke_defaults.traefik_non_ha_default_replicas) | int }}"

    - name: Smoke test summary
      ansible.builtin.debug:
        msg: "Smoke tests completed. Review output above for any failures."
