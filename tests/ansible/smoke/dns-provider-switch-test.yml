---
# DNS-01 Provider Switch Validation Smoke Test
# Purpose: Validate cert-manager issuer renewal after DNS provider change (SC-007)
# Usage: ansible-playbook -i tests/ansible/inventories/local tests/ansible/smoke/dns-provider-switch-test.yml

- name: DNS Provider Switch Smoke Test
  hosts: k3s_servers[0]
  gather_facts: false
  tasks:
    - name: Get current ClusterIssuers
      ansible.builtin.command: >-
        kubectl get clusterissuers -o json
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: issuers_before
      changed_when: false

    - name: Verify staging issuer exists
      ansible.builtin.assert:
        that:
          - issuers_before.stdout | from_json | json_query('items[?metadata.name==`' + cert_manager_staging_issuer + '`]') | length > 0
        fail_msg: "Staging issuer '{{ cert_manager_staging_issuer }}' not found"

    - name: Verify production issuer exists
      ansible.builtin.assert:
        that:
          - issuers_before.stdout | from_json | json_query('items[?metadata.name==`' + cert_manager_production_issuer + '`]') | length > 0
        fail_msg: "Production issuer '{{ cert_manager_production_issuer }}' not found"

    - name: Re-run cert-manager role with current provider config
      ansible.builtin.include_role:
        name: cert-manager
      vars:
        cert_manager_enabled: true

    - name: Get ClusterIssuers after re-run
      ansible.builtin.command: >-
        kubectl get clusterissuers -o json
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: issuers_after
      changed_when: false

    - name: Verify issuers are still Ready after re-apply
      ansible.builtin.command: >-
        kubectl get clusterissuers -o jsonpath='{range .items[*]}{.metadata.name}{" "}{.status.conditions[0].type}{" "}{.status.conditions[0].status}{"\n"}{end}'
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: issuer_status
      changed_when: false

    - name: Assert all issuers report Ready
      ansible.builtin.assert:
        that:
          - "'Ready True' in issuer_status.stdout"
        fail_msg: "Not all ClusterIssuers are Ready after provider config re-apply"
