---
# Upgrade Operation Smoke Tests
# Purpose: Validate upgrade-k3s.yml playbook functionality
# Usage: ansible-playbook -i tests/ansible/inventories/local tests/ansible/smoke/upgrade-test.yml
#
# Test Coverage:
# 1. Pre-upgrade cluster validation
# 2. Version verification
# 3. Post-upgrade health checks
# 4. Rollback guidance
#
# Prerequisites:
# - Existing k3s cluster
# - Target k3s_version defined in group_vars or extra-vars

- name: Pre-Upgrade Validation
  hosts: k3s_servers[0]
  gather_facts: no
  tasks:
    - name: Get current k3s version
      ansible.builtin.command:
        cmd: k3s --version
      register: current_version
      changed_when: false

    - name: Display current version
      ansible.builtin.debug:
        msg: "Current k3s version: {{ current_version.stdout.split()[2] }}"

    - name: Get all node versions
      ansible.builtin.command:
        cmd: kubectl get nodes -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.nodeInfo.kubeletVersion}{"\n"}{end}'
      register: node_versions
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display node versions
      ansible.builtin.debug:
        msg: "{{ node_versions.stdout_lines }}"

    - name: Check cluster health
      ansible.builtin.command:
        cmd: kubectl get nodes -o json
      register: cluster_health
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Parse cluster health
      ansible.builtin.set_fact:
        nodes_data: "{{ cluster_health.stdout | from_json }}"

    - name: Count Ready nodes
      ansible.builtin.set_fact:
        ready_nodes: "{{ nodes_data.items | selectattr('status.conditions', 'defined') | selectattr('status.conditions', 'search', 'Ready.*True') | list | length }}"
        total_nodes: "{{ nodes_data.items | length }}"

    - name: Verify cluster is healthy
      ansible.builtin.assert:
        that:
          - ready_nodes | int == total_nodes | int
        fail_msg: "Cluster not healthy: {{ ready_nodes }}/{{ total_nodes }} nodes Ready"
        success_msg: "✓ Cluster healthy: All {{ total_nodes }} nodes Ready"

- name: Upgrade Test Instructions
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Display upgrade test procedure
      ansible.builtin.debug:
        msg:
          - "====== Upgrade Test Procedure ======"
          - ""
          - "To test the upgrade functionality:"
          - ""
          - "1. BACKUP ETCD DATA (critical!):"
          - "   On control-plane: tar -czf etcd-backup.tar.gz /var/lib/rancher/k3s/server/db/"
          - ""
          - "2. Set target version in group_vars/all.yml or use extra-vars:"
          - "   k3s_version: v1.28.6+k3s1"
          - ""
          - "3. Run upgrade playbook:"
          - "   ansible-playbook -i <inventory> playbooks/upgrade-k3s.yml"
          - ""
          - "4. Monitor upgrade progress:"
          - "   - Watch for each node to complete"
          - "   - Verify nodes return to Ready state"
          - "   - Check application pod status"
          - ""
          - "5. Post-upgrade validation:"
          - "   - Run: kubectl get nodes"
          - "   - Verify all nodes show new version"
          - "   - Test application functionality"
          - ""
          - "6. If issues occur:"
          - "   - Check logs: journalctl -u k3s -f"
          - "   - Rollback: Reinstall previous version"
          - "   - Restore etcd backup if needed"

- name: Simulated Upgrade Validation
  hosts: k3s_servers[0]
  gather_facts: no
  tasks:
    - name: Check if target version is defined
      ansible.builtin.set_fact:
        target_version_defined: "{{ k3s_version is defined and k3s_version | length > 0 }}"

    - name: Display target version status
      ansible.builtin.debug:
        msg: "{{ 'Target version: ' + k3s_version if target_version_defined else 'No target version defined (use -e k3s_version=vX.Y.Z+k3s1)' }}"

    - name: Test version compatibility check
      ansible.builtin.debug:
        msg:
          - "Version compatibility checks:"
          - "- k3s supports upgrades within the same minor version (e.g. 1.28.5 → 1.28.6)"
          - "- Minor version upgrades require testing (e.g. 1.27.x → 1.28.x)"
          - "- Major version upgrades need careful planning"
          - "- Always check k3s release notes for breaking changes"

- name: Post-Upgrade Health Checks
  hosts: k3s_servers[0]
  gather_facts: no
  tasks:
    - name: Validate all nodes are Ready
      ansible.builtin.command:
        cmd: kubectl get nodes --no-headers
      register: post_upgrade_nodes
      changed_when: false
      failed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Count Ready nodes
      ansible.builtin.set_fact:
        ready_count: "{{ post_upgrade_nodes.stdout_lines | select('search', 'Ready') | reject('search', 'NotReady') | list | length }}"
        total_count: "{{ post_upgrade_nodes.stdout_lines | length }}"
      when: post_upgrade_nodes.rc == 0

    - name: Display node readiness
      ansible.builtin.debug:
        msg: "{{ ready_count | default(0) }}/{{ total_count | default(0) }} nodes Ready"
      when: post_upgrade_nodes.rc == 0

    - name: Check system pods
      ansible.builtin.command:
        cmd: kubectl get pods -n kube-system --no-headers
      register: system_pods
      changed_when: false
      failed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Count Running system pods
      ansible.builtin.set_fact:
        running_pods: "{{ system_pods.stdout_lines | select('search', 'Running') | list | length }}"
        total_pods: "{{ system_pods.stdout_lines | length }}"
      when: system_pods.rc == 0

    - name: Display system pod health
      ansible.builtin.debug:
        msg: "kube-system: {{ running_pods | default(0) }}/{{ total_pods | default(0) }} pods Running"
      when: system_pods.rc == 0

    - name: Test cluster API responsiveness
      ansible.builtin.command:
        cmd: kubectl version --short
      register: api_test
      changed_when: false
      failed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Validate API is responsive
      ansible.builtin.debug:
        msg: "{{ '✓ API server responsive' if api_test.rc == 0 else '✗ API server not responsive' }}"

    - name: Test pod scheduling
      ansible.builtin.command:
        cmd: kubectl run upgrade-smoke-{{ ansible_date_time.epoch }} --image={{ smoke_test_image }} --restart=Never --rm -i --command -- echo "Upgrade test successful"
      register: scheduling_test
      changed_when: false
      failed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Validate scheduling works
      ansible.builtin.debug:
        msg: "{{ '✓ Pod scheduling functional' if scheduling_test.rc == 0 else '✗ Pod scheduling failed' }}"

- name: Rollback Guidance
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Display rollback procedure
      ansible.builtin.debug:
        msg:
          - "====== Rollback Procedure (if needed) ======"
          - ""
          - "If upgrade causes issues:"
          - ""
          - "1. IMMEDIATE ROLLBACK:"
          - "   On each node (control-plane first, then workers):"
          - "   export PREVIOUS_VERSION=v1.28.5+k3s1"
          - "   curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION=$PREVIOUS_VERSION sh -"
          - ""
          - "2. VERIFY ROLLBACK:"
          - "   k3s --version"
          - "   kubectl get nodes"
          - ""
          - "3. RESTORE ETCD (if data corruption):"
          - "   systemctl stop k3s"
          - "   rm -rf /var/lib/rancher/k3s/server/db/"
          - "   tar -xzf etcd-backup.tar.gz -C /"
          - "   systemctl start k3s"
          - ""
          - "4. CHECK CLUSTER HEALTH:"
          - "   kubectl get nodes"
          - "   kubectl get pods --all-namespaces"
          - ""
          - "5. REPORT ISSUE:"
          - "   Collect logs: journalctl -u k3s > k3s-upgrade-failure.log"
          - "   Check k3s GitHub issues"

- name: Upgrade Test Summary
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Display summary
      ansible.builtin.debug:
        msg:
          - "====== Upgrade Test Complete ======"
          - ""
          - "Pre-upgrade validation: ✓"
          - "Procedure documentation: ✓"
          - "Health check framework: ✓"
          - "Rollback guidance: ✓"
          - ""
          - "Ready for production upgrades."
          - ""
          - "Remember:"
          - "- ALWAYS backup etcd before upgrading"
          - "- Test upgrades in non-production first"
          - "- Review k3s release notes"
          - "- Monitor cluster during upgrade"
          - "- Have rollback plan ready"
