# Example Single-Node k3s Cluster Inventory
# Purpose: Demonstrates a minimal single control-plane node cluster (non-HA)
#
# Usage:
#   ansible-playbook -i ansible/inventories/examples/single-node/hosts.ini ansible/playbooks/cluster-core.yml

[k3s_servers]
k3s-single ansible_host=192.168.1.100 ansible_user=admin

[k3s_cluster:children]
k3s_servers

[k3s_cluster:vars]
# Ansible connection settings
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
