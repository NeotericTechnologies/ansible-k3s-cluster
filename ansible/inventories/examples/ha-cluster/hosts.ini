# Example HA k3s Cluster Inventory
# Purpose: Demonstrates a 3-node control-plane + 2-worker HA cluster with embedded etcd
#
# Usage:
#   ansible-playbook -i ansible/inventories/examples/ha-cluster/hosts.ini ansible/playbooks/cluster-core.yml

[k3s_servers]
k3s-server-01 ansible_host=192.168.1.101 ansible_user=admin
k3s-server-02 ansible_host=192.168.1.102 ansible_user=admin
k3s-server-03 ansible_host=192.168.1.103 ansible_user=admin

[k3s_agents]
k3s-agent-01 ansible_host=192.168.1.111 ansible_user=admin
k3s-agent-02 ansible_host=192.168.1.112 ansible_user=admin

[k3s_cluster:children]
k3s_servers
k3s_agents

[k3s_cluster:vars]
# Ansible connection settings
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
