---
# upgrade-components.yml
# Component registry for the unified upgrade workflow
# Reference: specs/005-unified-upgrade-workflow/data-model.md
#
# Each component defines:
#   name:           Identifier used in upgrade_plan facts
#   version_var:    Ansible variable holding desired version
#   enabled_var:    Ansible variable for enablement (null = always enabled)
#   detect_method:  How to discover live version (k3s_binary, helm_release, manifest_label)
#   detect_args:    Method-specific arguments
#   upgrade_priority: Execution order (lower = earlier)
#   play_file:      Include file that performs the upgrade

upgrade_components:
  - name: rancher
    version_var: rancher_version
    enabled_var: rancher_enabled
    detect_method: helm_release
    detect_args:
      release_name: rancher
      namespace: cattle-system
    upgrade_priority: 10
    play_file: includes/upgrade-rancher.yml

  - name: kube_vip
    version_var: kube_vip_version
    enabled_var: kube_vip_enabled
    detect_method: manifest_label
    detect_args:
      label_selector: "app.kubernetes.io/name=kube-vip"
      namespace: kube-system
    upgrade_priority: 15
    play_file: includes/upgrade-kube-vip.yml

  - name: k3s
    version_var: k3s_version
    enabled_var: null
    detect_method: k3s_binary
    detect_args: {}
    upgrade_priority: 20
    play_file: includes/upgrade-k3s-rolling.yml

  - name: cert_manager
    version_var: cert_manager_version
    enabled_var: cert_manager_enabled
    detect_method: helm_release
    detect_args:
      release_name: cert-manager
      namespace: cert-manager
    upgrade_priority: 30
    play_file: includes/upgrade-addon.yml

  - name: traefik
    version_var: traefik_version
    enabled_var: traefik_enabled
    detect_method: helm_release
    detect_args:
      release_name: traefik
      namespace: kube-system
    upgrade_priority: 31
    play_file: includes/upgrade-addon.yml

  - name: rancher_monitoring
    version_var: rancher_monitoring_version
    enabled_var: rancher_monitoring_enabled
    detect_method: helm_release
    detect_args:
      release_name: rancher-monitoring
      namespace: cattle-monitoring-system
    upgrade_priority: 32
    play_file: includes/upgrade-addon.yml

  - name: multus
    version_var: multus_version
    enabled_var: multus_enabled
    detect_method: manifest_label
    detect_args:
      label_selector: "app=multus"
      namespace: kube-system
    upgrade_priority: 33
    play_file: includes/upgrade-addon.yml

  - name: synology_csi
    version_var: synology_csi_version
    enabled_var: synology_csi_enabled
    detect_method: helm_release
    detect_args:
      release_name: synology-csi
      namespace: synology-csi
    upgrade_priority: 34
    play_file: includes/upgrade-addon.yml
