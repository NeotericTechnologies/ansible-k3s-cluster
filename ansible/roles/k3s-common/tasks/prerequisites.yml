---
# ansible/roles/k3s-common/tasks/prerequisites.yml
# Purpose: Validate host prerequisites before k3s installation
# Reference: FR-013, SC-006

- name: Gather facts if not already gathered
  ansible.builtin.setup:
  when: ansible_facts.keys() | length == 0

- name: Check if initial host setup has already completed
  ansible.builtin.stat:
    path: "{{ k3s_initial_setup_marker_path }}"
  register: k3s_initial_setup_marker

- name: Run one-time initial host setup
  when:
    - k3s_initial_server_setup | bool
    - not k3s_initial_setup_marker.stat.exists
  block:
    - name: Set hostname from inventory
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"
      when: ansible_facts.hostname != inventory_hostname

    # DHCP renewal can briefly interrupt SSH; run asynchronously then reconnect.
    - name: Renew DHCP lease on primary interface
      ansible.builtin.shell: |
        set -e
        iface="{{ ansible_default_ipv4.interface | default('') }}"
        if command -v dhclient >/dev/null 2>&1; then
          if [[ -n "$iface" ]]; then
            dhclient -r "$iface" || true
            dhclient "$iface"
          else
            dhclient -r || true
            dhclient
          fi
        elif command -v networkctl >/dev/null 2>&1 && [[ -n "$iface" ]]; then
          networkctl renew "$iface"
        else
          echo "No supported DHCP renewal command found (dhclient or networkctl)." >&2
          exit 1
        fi
      args:
        executable: /bin/bash
      async: 120
      poll: 0
      changed_when: true
      when: k3s_renew_dhcp_lease_on_bootstrap | bool

    - name: Wait for SSH to become available after DHCP renewal
      ansible.builtin.wait_for_connection:
        timeout: 180
        sleep: 5
      when: k3s_renew_dhcp_lease_on_bootstrap | bool

    - name: Ensure bootstrap marker directory exists
      ansible.builtin.file:
        path: "{{ k3s_initial_setup_marker_path | dirname }}"
        state: directory
        mode: '0755'

    - name: Record completion of initial host setup
      ansible.builtin.copy:
        dest: "{{ k3s_initial_setup_marker_path }}"
        content: "completed={{ ansible_date_time.iso8601 }}\n"
        mode: '0644'

- name: Validate operating system family
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family == 'Debian'
    fail_msg: "Unsupported OS family: {{ ansible_facts.os_family }}. Only Debian/Ubuntu are supported."
    success_msg: "Operating system family check passed: {{ ansible_facts.os_family }}"

- name: Validate operating system distribution
  ansible.builtin.assert:
    that:
      - ansible_facts.distribution in ['Debian', 'Ubuntu']
    fail_msg: "Unsupported distribution: {{ ansible_facts.distribution }}. Only Debian and Ubuntu are supported."
    success_msg: "Operating system distribution check passed: {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}"

- name: Validate system architecture
  ansible.builtin.assert:
    that:
      - ansible_facts.architecture in ['x86_64', 'aarch64', 'arm64']
    fail_msg: "Unsupported architecture: {{ ansible_facts.architecture }}. Only x86_64 and arm64 are supported."
    success_msg: "System architecture check passed: {{ ansible_facts.architecture }}"

- name: Validate systemd is present
  ansible.builtin.assert:
    that:
      - ansible_facts.service_mgr == 'systemd'
    fail_msg: "systemd is required for k3s service management. Found: {{ ansible_facts.service_mgr }}"
    success_msg: "systemd check passed"

- name: Validate minimum CPU cores
  ansible.builtin.assert:
    that:
      - ansible_facts.processor_vcpus >= k3s_min_cpu_cores
    fail_msg: "Insufficient CPU cores: {{ ansible_facts.processor_vcpus }}. Minimum required: {{ k3s_min_cpu_cores }}"
    success_msg: "CPU cores check passed: {{ ansible_facts.processor_vcpus }} cores available"

- name: Validate minimum memory (MB)
  ansible.builtin.assert:
    that:
      - ansible_facts.memtotal_mb >= k3s_min_memory_mb
    fail_msg: "Insufficient memory: {{ ansible_facts.memtotal_mb }}MB. Minimum required: {{ k3s_min_memory_mb }}MB"
    success_msg: "Memory check passed: {{ ansible_facts.memtotal_mb }}MB available"

- name: Validate minimum disk space (root partition)
  ansible.builtin.assert:
    that:
      - (ansible_facts.mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_available') | first / 1024 / 1024 / 1024) | int >= k3s_min_disk_gb
    fail_msg: "Insufficient disk space on /: {{ (ansible_facts.mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_available') | first / 1024 / 1024 / 1024) | int }}GB. Minimum required: {{ k3s_min_disk_gb }}GB"
    success_msg: "Disk space check passed: {{ (ansible_facts.mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_available') | first / 1024 / 1024 / 1024) | int }}GB available"

- name: Check Python 3 is installed
  ansible.builtin.command: python3 --version
  register: python3_version
  changed_when: false
  failed_when: python3_version.rc != 0

- name: Report Python version
  ansible.builtin.debug:
    msg: "Python 3 check passed: {{ python3_version.stdout }}"

- name: Check if iptables or nftables is available
  ansible.builtin.command: "{{ item }}"
  register: firewall_check
  changed_when: false
  failed_when: false
  loop:
    - iptables --version
    - nft --version

- name: Determine which firewall backend is available
  ansible.builtin.set_fact:
    firewall_backend_available: "{{ (firewall_check.results | selectattr('rc', 'equalto', 0) | list | length) > 0 }}"
    firewall_backend_type: "{% set iptables_result = firewall_check.results | selectattr('item', 'equalto', 'iptables --version') | map(attribute='rc') | first | default(1) %}{{ 'iptables' if iptables_result == 0 else 'nftables' }}"

- name: Install nftables when no firewall backend is present
  ansible.builtin.apt:
    name: nftables
    state: present
    update_cache: true
    cache_valid_time: 3600
  when:
    - not firewall_backend_available
    - ansible_facts.os_family == 'Debian'

- name: Verify nftables availability after installation
  ansible.builtin.command: nft --version
  register: nft_check
  changed_when: false
  failed_when: false
  when: not firewall_backend_available

- name: Update firewall backend type after installation
  ansible.builtin.set_fact:
    firewall_backend_type: "nftables"
  when: not firewall_backend_available and (nft_check is defined and nft_check.rc == 0)

- name: Validate firewall backend is available
  ansible.builtin.assert:
    that:
      - firewall_backend_available or (nft_check is defined and nft_check.rc == 0)
    fail_msg: "Neither iptables nor nftables is available. One is required for kube-proxy."
    success_msg: "Firewall backend check passed: {{ firewall_backend_type }}"

- name: Check network connectivity to k3s GitHub releases
  ansible.builtin.uri:
    url: https://github.com/k3s-io/k3s/releases
    method: HEAD
    timeout: 10
  register: github_connectivity
  failed_when: false
  when: k3s_check_internet | default(true)

- name: Report network connectivity status
  ansible.builtin.debug:
    msg: "{{ 'Internet connectivity check passed' if github_connectivity.status == 200 else 'Warning: Cannot reach k3s GitHub releases (offline mode?)' }}"
  when: k3s_check_internet | default(true)

- name: Prerequisite validation summary
  ansible.builtin.debug:
    msg: "All host prerequisite checks passed for {{ inventory_hostname }}"
