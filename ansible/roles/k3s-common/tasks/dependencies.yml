---
# ansible/roles/k3s-common/tasks/dependencies.yml
# Purpose: Install common dependencies required by k3s
# Reference: docs/ansible-structure.md

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == 'Debian'

- name: Install required packages for k3s
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - apt-transport-https
      - software-properties-common
      - iptables
      - python3
      - python3-pip
    state: present
  when: ansible_os_family == 'Debian'

- name: Ensure systemd is running
  ansible.builtin.systemd:
    daemon_reload: true
