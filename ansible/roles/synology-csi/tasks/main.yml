---
# ansible/roles/synology-csi/tasks/main.yml
# Purpose: Deploy Synology CSI for persistent storage
# Reference: FR-015, FR-018, Contract C-005

- name: Include Synology CSI installation tasks
  ansible.builtin.include_tasks: install.yml
  when: synology_csi_enabled | default(false)
  tags:
    - install
    - storage

- name: Include csi-driver-nfs installation tasks
  ansible.builtin.include_tasks: csi-driver-nfs.yml
  when: csi_nfs_enabled | default(false)
  tags:
    - install
    - storage
    - csi-nfs
