---
# ansible/roles/rancher-monitoring/tasks/install.yml
# Purpose: Deploy rancher-monitoring via Helm
# Reference: FR-008

- name: Create cattle-monitoring-system namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: cattle-monitoring-system
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml

- name: Generate monitoring Helm values
  ansible.builtin.template:
    src: monitoring-values.yaml.j2
    dest: /tmp/monitoring-values.yaml
    mode: '0644'

- name: Install rancher-monitoring via Helm
  ansible.builtin.shell: |
    helm repo add rancher-charts https://charts.rancher.io
    helm repo update
    helm upgrade --install rancher-monitoring rancher-charts/rancher-monitoring \
      --namespace cattle-monitoring-system \
      --values /tmp/monitoring-values.yaml \
      --version {{ rancher_monitoring_version }}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: monitoring_install
  changed_when: "'deployed' in monitoring_install.stdout or 'upgraded' in monitoring_install.stdout"

- name: Clean up temporary values file
  ansible.builtin.file:
    path: /tmp/monitoring-values.yaml
    state: absent

- name: Wait for rancher-monitoring to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: cattle-monitoring-system
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    label_selectors:
      - app.kubernetes.io/name=grafana
  register: monitoring_deploy
  retries: 20
  delay: 30
  until: >-
    (monitoring_deploy.resources | default([]) | length) > 0 and
    (monitoring_deploy.resources[0].status.availableReplicas | default(0) | int) >= 1
  changed_when: false
