---
# ansible/roles/cert-manager/tasks/install.yml
# Purpose: Deploy cert-manager and configure DNS-01 ClusterIssuers
# Reference: FR-005, FR-017

- name: Fetch cert-manager CRDs manifest
  ansible.builtin.uri:
    url: "https://github.com/cert-manager/cert-manager/releases/download/{{ cert_manager_version }}/cert-manager.crds.yaml"
    return_content: true
  register: cert_manager_crds_manifest

- name: Install cert-manager CRDs
  kubernetes.core.k8s:
    definition: "{{ item }}"
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  loop: "{{ cert_manager_crds_manifest.content | from_yaml_all | list }}"
  loop_control:
    label: "{{ item.kind | default('Resource') }}/{{ item.metadata.name | default('unnamed') }}"
  when: item is not none

- name: Create cert-manager namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: cert-manager
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml

- name: Fetch cert-manager deployment manifest
  ansible.builtin.uri:
    url: "https://github.com/cert-manager/cert-manager/releases/download/{{ cert_manager_version }}/cert-manager.yaml"
    return_content: true
  register: cert_manager_manifest

- name: Deploy cert-manager
  kubernetes.core.k8s:
    definition: "{{ item }}"
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  loop: "{{ cert_manager_manifest.content | from_yaml_all | list }}"
  loop_control:
    label: "{{ item.kind | default('Resource') }}/{{ item.metadata.name | default('unnamed') }}"
  when: item is not none

- name: Wait for cert-manager deployment to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: cert-manager
    namespace: cert-manager
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  register: cm_deploy
  retries: 30
  delay: 10
  until: >-
    (cm_deploy.resources | default([]) | length) > 0 and
    (cm_deploy.resources[0].status.availableReplicas | default(0) | int) >= 1
  changed_when: false

- name: Wait for cert-manager-webhook deployment to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: cert-manager-webhook
    namespace: cert-manager
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  register: cm_webhook_deploy
  retries: 30
  delay: 10
  until: >-
    (cm_webhook_deploy.resources | default([]) | length) > 0 and
    (cm_webhook_deploy.resources[0].status.availableReplicas | default(0) | int) >= 1
  changed_when: false

- name: Wait for cert-manager-cainjector deployment to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: cert-manager-cainjector
    namespace: cert-manager
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  register: cm_cainjector_deploy
  retries: 30
  delay: 10
  until: >-
    (cm_cainjector_deploy.resources | default([]) | length) > 0 and
    (cm_cainjector_deploy.resources[0].status.availableReplicas | default(0) | int) >= 1
  changed_when: false

- name: Scale cert-manager deployment to topology-aware replica target
  kubernetes.core.k8s:
    api_version: apps/v1
    kind: Deployment
    name: cert-manager
    namespace: cert-manager
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    definition:
      spec:
        replicas: "{{ cert_manager_replicas | default(1) | int }}"
  when: cert_manager_replicas is defined

- name: Scale cert-manager-webhook deployment to topology-aware replica target
  kubernetes.core.k8s:
    api_version: apps/v1
    kind: Deployment
    name: cert-manager-webhook
    namespace: cert-manager
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    definition:
      spec:
        replicas: "{{ cert_manager_replicas | default(1) | int }}"
  when: cert_manager_replicas is defined

- name: Scale cert-manager-cainjector deployment to topology-aware replica target
  kubernetes.core.k8s:
    api_version: apps/v1
    kind: Deployment
    name: cert-manager-cainjector
    namespace: cert-manager
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    definition:
      spec:
        replicas: "{{ cert_manager_replicas | default(1) | int }}"
  when: cert_manager_replicas is defined

- name: Apply DNS provider credentials secret
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'dns-credentials-secret.yaml.j2') | from_yaml }}"
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  when: cert_manager_dns_provider_credentials | default({}) | length > 0
  no_log: true

- name: Apply staging ClusterIssuer
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'clusterissuer-staging.yaml.j2') | from_yaml }}"
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml

- name: Apply production ClusterIssuer
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'clusterissuer-production.yaml.j2') | from_yaml }}"
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml

- name: Verify ClusterIssuers are ready
  ansible.builtin.command: >-
    kubectl get clusterissuers
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: clusterissuers
  changed_when: false

- name: cert-manager deployment summary
  ansible.builtin.debug:
    msg: |
      cert-manager deployed successfully:
      - Version: {{ cert_manager_version }}
      - DNS Provider: {{ cert_manager_dns_provider }}
      - Staging Issuer: {{ cert_manager_staging_issuer }}
      - Production Issuer: {{ cert_manager_production_issuer }}

      ClusterIssuers:
      {{ clusterissuers.stdout }}
