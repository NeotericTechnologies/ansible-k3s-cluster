tory# Reference: FR-005 (cert-manager deployment), FR-017 (provider-agnostic DNS-01)# Purpose: Install cert-manager and configure DNS-01 ClusterIssuers# ansible/roles/cert-manager/tasks/install.yml# ansible/roles/cert-manager/tasks/main.yml
