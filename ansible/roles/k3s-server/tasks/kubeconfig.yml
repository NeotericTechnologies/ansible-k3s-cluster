---
# ansible/roles/k3s-server/tasks/kubeconfig.yml
# Purpose: Configure kubeconfig for kubectl access

- name: Ensure kubeconfig directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kube"
    state: directory
    mode: '0750'

- name: Copy kubeconfig to user home directory
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ ansible_env.HOME }}/.kube/config"
    remote_src: true
    mode: '0600'
  when: inventory_hostname == groups['k3s_servers'][0]

- name: Replace localhost with control-plane VIP in kubeconfig
  ansible.builtin.replace:
    path: "{{ ansible_env.HOME }}/.kube/config"
    regexp: 'https://127\.0\.0\.1:6443'
    replace: "https://{{ control_plane_vip }}:{{ api_port }}"
  when: inventory_hostname == groups['k3s_servers'][0]

- name: Set KUBECONFIG environment variable hint
  ansible.builtin.debug:
    msg: "Kubeconfig is available at {{ ansible_env.HOME }}/.kube/config or /etc/rancher/k3s/k3s.yaml"
