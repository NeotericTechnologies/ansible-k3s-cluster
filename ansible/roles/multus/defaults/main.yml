---
multus_enabled: false
multus_namespace: kube-system
multus_kubeconfig: "/etc/rancher/k3s/k3s.yaml"

# Multus image (thick plugin variant — used for both multus DaemonSet and DHCP daemon)
# Reference: https://github.com/k8snetworkplumbingwg/multus-cni/blob/master/deployments/multus-daemonset-thick.yml
multus_image: "ghcr.io/k8snetworkplumbingwg/multus-cni"
multus_version: "v4.2.4-thick"

# k3s-compatible host path overrides
# These override the default /etc/cni/net.d and /opt/cni/bin paths
# for k3s which uses its own directory structure
multus_cni_conf_dir: "/var/lib/rancher/k3s/agent/etc/cni/net.d"
multus_cni_bin_dir: "/var/lib/rancher/k3s/data/current/bin"

# Multus daemon configuration
multus_log_level: "error"
multus_log_to_stderr: true

# DHCP daemon for DHCP-based IPAM on secondary networks
# When true, deploys a DHCP daemon DaemonSet that proxies DHCP requests
# from pods to the external DHCP server on the attached VLAN network.
# Set to false to skip DHCP daemon even when vlan_networks use ipam_type: dhcp.
multus_dhcp_daemon_enabled: true

# DHCP daemon container image (used for both the initContainer that downloads
# the dhcp binary and the main container that runs the daemon)
# Requires shell and wget — alpine provides both in a minimal footprint.
multus_dhcp_daemon_image: "alpine:3"

# CNI plugins release version — the initContainer downloads the official tarball
# from GitHub releases and extracts only the `dhcp` binary.
# Release: https://github.com/containernetworking/plugins/releases
multus_cni_plugins_version: "v1.9.1"

# VLAN network definitions for NetworkAttachmentDefinitions
multus_vlan_networks: []
# Example:
# multus_vlan_networks:
#   - name: storage-vlan
#     namespace: default
#     interface: eth0
#     vlan_id: 100
#     ipam_type: dhcp         # dhcp | host-local | static (default: dhcp)
#     cidr: 10.10.100.0/24   # required for host-local/static, ignored for dhcp
#     gateway: 10.10.100.1   # optional for host-local/static, ignored for dhcp
#
#   - name: iot-vlan
#     # Must match an interface that exists on every target node.
#     # Using enp6s18 (same NIC as kube_vip_interface) avoids "Link not found" from macvlan.
#     interface: enp6s18
#     # Leave vlan_id unset unless the host already has a matching VLAN subinterface (e.g. enp6s18.10).
#     ipam_type: dhcp          # dhcp (default) | host-local | static
#
#   - name: iot-vlan-2
#     interface: eth0
#     vlan_id: 50
#     ipam_type: dhcp          # dhcp (default) | host-local | static
#
#   - name: storage-net
#     interface: eth0
#     vlan_id: 100
#     ipam_type: host-local
#     cidr: 10.100.0.0/24
#     gateway: 10.100.0.1
