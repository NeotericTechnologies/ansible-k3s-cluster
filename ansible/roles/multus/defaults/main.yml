---
multus_enabled: false
multus_namespace: kube-system
multus_kubeconfig: "/etc/rancher/k3s/k3s.yaml"

# Helm chart settings (official multus Helm chart)
multus_helm_repo_name: k8snetworkplumbingwg
multus_helm_repo_url: "https://k8snetworkplumbingwg.github.io/helm-charts"
multus_helm_chart_name: multus
multus_helm_chart_version: "4.1.2"
multus_helm_release_name: multus

# k3s-compatible host path overrides (set via Helm values)
multus_cni_conf_dir: "/var/lib/rancher/k3s/agent/etc/cni/net.d"
multus_cni_bin_dir: "/var/lib/rancher/k3s/data/current/bin"

# VLAN network definitions for NetworkAttachmentDefinitions
multus_vlan_networks: []
# Example:
# multus_vlan_networks:
#   - name: storage-vlan
#     namespace: default
#     interface: eth0
#     vlan_id: 100
#     cidr: 10.10.100.0/24
#     gateway: 10.10.100.1
