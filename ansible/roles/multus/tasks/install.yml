---
# ansible/roles/multus/tasks/install.yml
# Purpose: Install multus CNI thick plugin via DaemonSet manifest and configure NetworkAttachmentDefinitions
# Reference: FR-006, R-008
# Documentation: https://github.com/k8snetworkplumbingwg/multus-cni/tree/master/docs

- name: Ensure multus CNI config directory exists on nodes
  ansible.builtin.file:
    path: "{{ multus_cni_conf_dir }}/multus.d"
    state: directory
    mode: "0755"
  delegate_to: "{{ item }}"
  loop: "{{ groups['k3s_servers'] + groups['k3s_agents'] }}"

- name: Deploy multus thick plugin DaemonSet and RBAC
  ansible.builtin.command:
    argv:
      - kubectl
      - apply
      - -f
      - "-"
    stdin: "{{ lookup('template', 'multus-daemonset-thick.yml.j2') }}"
  environment:
    KUBECONFIG: "{{ multus_kubeconfig }}"
  register: multus_deploy_result
  changed_when: >-
    'created' in multus_deploy_result.stdout or
    'configured' in multus_deploy_result.stdout

- name: Wait for multus DaemonSet to be ready
  ansible.builtin.command: >-
    kubectl rollout status daemonset/kube-multus-ds -n {{ multus_namespace }} --timeout=180s
  environment:
    KUBECONFIG: "{{ multus_kubeconfig }}"
  register: multus_ready
  retries: 3
  delay: 10
  until: multus_ready.rc == 0
  changed_when: false
  when: multus_deploy_result is defined and multus_deploy_result.changed

- name: Validate DHCP daemon is enabled when VLAN networks require DHCP IPAM
  ansible.builtin.assert:
    that:
      - multus_dhcp_daemon_enabled | default(true)
    fail_msg: >-
      DHCP daemon must be enabled when VLAN networks use ipam_type: dhcp.
      Set multus_dhcp_daemon_enabled: true or change ipam_type for networks:
      {{ multus_vlan_networks | selectattr('ipam_type', 'undefined') | map(attribute='name') | list +
         multus_vlan_networks | selectattr('ipam_type', 'defined') | selectattr('ipam_type', 'equalto', 'dhcp') | map(attribute='name') | list }}
  when: >-
    multus_vlan_networks | default([]) | length > 0 and
    (multus_vlan_networks | selectattr('ipam_type', 'undefined') | list | length > 0 or
     multus_vlan_networks | selectattr('ipam_type', 'defined') | selectattr('ipam_type', 'equalto', 'dhcp') | list | length > 0)

- name: Apply NetworkAttachmentDefinitions
  ansible.builtin.command:
    argv:
      - kubectl
      - apply
      - -f
      - "-"
    stdin: "{{ lookup('template', 'network-attachment-definition.yaml.j2') }}"
  environment:
    KUBECONFIG: "{{ multus_kubeconfig }}"
  loop: "{{ multus_vlan_networks }}"
  register: multus_nad_apply
  changed_when: >-
    multus_nad_apply.stdout is defined and
    ('created' in multus_nad_apply.stdout or 'configured' in multus_nad_apply.stdout)
  when: multus_vlan_networks | default([]) | length > 0

- name: Deploy multus DHCP daemon DaemonSet
  ansible.builtin.command:
    argv:
      - kubectl
      - apply
      - -f
      - "-"
    stdin: "{{ lookup('template', 'multus-dhcp-daemon.yaml.j2') }}"
  environment:
    KUBECONFIG: "{{ multus_kubeconfig }}"
  register: multus_dhcp_deploy_result
  changed_when: >-
    'created' in multus_dhcp_deploy_result.stdout or
    'configured' in multus_dhcp_deploy_result.stdout
  when: multus_dhcp_daemon_enabled | default(true)

- name: Wait for multus DHCP daemon DaemonSet to be ready
  ansible.builtin.command: >-
    kubectl rollout status daemonset/multus-dhcp-daemon -n {{ multus_namespace }} --timeout=120s
  environment:
    KUBECONFIG: "{{ multus_kubeconfig }}"
  register: multus_dhcp_ready
  retries: 3
  delay: 10
  until: multus_dhcp_ready.rc == 0
  changed_when: false
  when: >-
    multus_dhcp_daemon_enabled | default(true) and
    multus_dhcp_deploy_result is defined and multus_dhcp_deploy_result.changed

- name: Remove multus DHCP daemon DaemonSet when disabled
  ansible.builtin.command:
    argv:
      - kubectl
      - delete
      - daemonset
      - multus-dhcp-daemon
      - -n
      - "{{ multus_namespace }}"
      - --ignore-not-found=true
  environment:
    KUBECONFIG: "{{ multus_kubeconfig }}"
  register: multus_dhcp_remove_result
  changed_when: >-
    multus_dhcp_remove_result.stdout is defined and
    'deleted' in multus_dhcp_remove_result.stdout
  when: not (multus_dhcp_daemon_enabled | default(true))

- name: Multus deployment summary
  ansible.builtin.debug:
    msg: |
      multus thick plugin deployed successfully via DaemonSet manifest:
      - Image: {{ multus_image }}:{{ multus_version }}
      - CNI conf dir: {{ multus_cni_conf_dir }}
      - CNI bin dir: {{ multus_cni_bin_dir }}
      - DHCP daemon: {{ 'enabled' if (multus_dhcp_daemon_enabled | default(true)) else 'disabled' }}
      - VLAN Networks: {{ multus_vlan_networks | map(attribute='name') | list | join(', ') if multus_vlan_networks else 'None' }}
