---
# ansible/roles/multus/tasks/install.yml
# Purpose: Install multus CNI and configure NetworkAttachmentDefinitions
# Reference: FR-006 (multus for VLAN secondary networking)

- name: Deploy multus DaemonSet
  ansible.builtin.command: >-
    kubectl apply -f https://raw.githubusercontent.com/k8snetworkplumbingwg/multus-cni/{{ multus_version }}/deployments/multus-daemonset-thick.yml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: multus_deploy
  changed_when: "'created' in multus_deploy.stdout or 'configured' in multus_deploy.stdout"

- name: Patch multus daemon config for k3s CNI paths
  ansible.builtin.command:
    argv:
      - kubectl
      - patch
      - configmap
      - multus-daemon-config
      - -n
      - kube-system
      - --type=merge
      - -p
      - >-
        {"data":{"daemon-config.json":"{\"confDir\":\"/host/etc/cni/net.d\",\"logLevel\":\"verbose\",\"socketDir\":\"/host/run/multus/\",\"cniVersion\":\"0.3.1\",\"cniConfigDir\":\"/host/etc/cni/net.d\",\"multusConfigFile\":\"auto\",\"multusAutoconfigDir\":\"/host/etc/cni/net.d\",\"binDir\":\"/host/opt/cni/bin\"}"}}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: multus_cm_patch
  changed_when: "'patched' in multus_cm_patch.stdout"

- name: Patch multus DaemonSet volumes for k3s paths
  ansible.builtin.command:
    argv:
      - kubectl
      - patch
      - daemonset
      - kube-multus-ds
      - -n
      - kube-system
      - --type=strategic
      - -p
      - >-
        {"spec":{"template":{"spec":{"volumes":[{"name":"cni","hostPath":{"path":"/var/lib/rancher/k3s/agent/etc/cni/net.d"}},{"name":"cnibin","hostPath":{"path":"/var/lib/rancher/k3s/data/current/bin"}}]}}}}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: multus_vol_patch
  changed_when: "'patched' in multus_vol_patch.stdout"
  failed_when: multus_vol_patch.rc != 0 and 'not patched' not in multus_vol_patch.stdout

- name: Restart multus pods to pick up config and volume changes
  ansible.builtin.command: >-
    kubectl rollout restart daemonset/kube-multus-ds -n kube-system
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: true

- name: Wait for multus to be ready
  ansible.builtin.command: >-
    kubectl wait --for=condition=ready pod
    -l app=multus
    -n kube-system
    --timeout=60s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: multus_ready
  retries: 5
  delay: 10
  until: multus_ready.rc == 0
  changed_when: false

- name: Create NetworkAttachmentDefinitions for VLAN networks
  ansible.builtin.template:
    src: network-attachment-definition.yaml.j2
    dest: "/tmp/nad-{{ item.name }}.yaml"
    mode: '0644'
  loop: "{{ multus_vlan_networks }}"
  when: multus_vlan_networks | default([]) | length > 0

- name: Apply NetworkAttachment Definitions
  ansible.builtin.command: >-
    kubectl apply -f /tmp/nad-{{ item.name }}.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  loop: "{{ multus_vlan_networks }}"
  when: multus_vlan_networks | default([]) | length > 0
  register: multus_nad_apply
  changed_when: "'created' in multus_nad_apply.stdout or 'configured' in multus_nad_apply.stdout"

- name: Clean up temporary NetworkAttachmentDefinition files
  ansible.builtin.file:
    path: "/tmp/nad-{{ item.name }}.yaml"
    state: absent
  loop: "{{ multus_vlan_networks }}"
  when: multus_vlan_networks | default([]) | length > 0

- name: multus deployment summary
  ansible.builtin.debug:
    msg: |
      multus deployed successfully:
      - Version: {{ multus_version }}
      - VLAN Networks: {{ multus_vlan_networks | map(attribute='name') | list | join(', ') if multus_vlan_networks else 'None' }}
