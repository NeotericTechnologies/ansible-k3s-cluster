---
# ansible/roles/multus/tasks/install.yml
# Purpose: Install multus CNI thick plugin via DaemonSet manifest and configure NetworkAttachmentDefinitions
# Reference: FR-006, R-008
# Documentation: https://github.com/k8snetworkplumbingwg/multus-cni/tree/master/docs

- name: Ensure multus CNI config directory exists on nodes
  ansible.builtin.file:
    path: "{{ multus_cni_conf_dir }}/multus.d"
    state: directory
    mode: "0755"
  delegate_to: "{{ item }}"
  loop: "{{ groups['k3s_servers'] + groups['k3s_agents'] }}"

- name: Deploy multus thick plugin DaemonSet and RBAC
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'multus-daemonset-thick.yml.j2') | from_yaml_all | list }}"
    kubeconfig: "{{ multus_kubeconfig }}"
  register: multus_deploy_result

- name: Wait for multus DaemonSet to be ready
  ansible.builtin.command: >-
    kubectl rollout status daemonset/kube-multus-ds -n {{ multus_namespace }} --timeout=180s
  environment:
    KUBECONFIG: "{{ multus_kubeconfig }}"
  register: multus_ready
  retries: 3
  delay: 10
  until: multus_ready.rc == 0
  changed_when: false
  when: multus_deploy_result is defined and multus_deploy_result.changed

- name: Apply NetworkAttachmentDefinitions
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'network-attachment-definition.yaml.j2') }}"
    kubeconfig: "{{ multus_kubeconfig }}"
  loop: "{{ multus_vlan_networks }}"
  when: multus_vlan_networks | default([]) | length > 0

- name: Multus deployment summary
  ansible.builtin.debug:
    msg: |
      multus thick plugin deployed successfully via DaemonSet manifest:
      - Image: {{ multus_image }}:{{ multus_image_tag }}
      - CNI conf dir: {{ multus_cni_conf_dir }}
      - CNI bin dir: {{ multus_cni_bin_dir }}
      - VLAN Networks: {{ multus_vlan_networks | map(attribute='name') | list | join(', ') if multus_vlan_networks else 'None' }}
