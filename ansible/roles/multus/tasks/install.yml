---
# ansible/roles/multus/tasks/install.yml
# Purpose: Install multus CNI via official Helm chart and configure NetworkAttachmentDefinitions
# Reference: FR-006, R-008

- name: Add multus Helm repository
  kubernetes.core.helm_repository:
    name: "{{ multus_helm_repo_name }}"
    repo_url: "{{ multus_helm_repo_url }}"
    state: present

- name: Template multus Helm values
  ansible.builtin.set_fact:
    multus_helm_values: "{{ lookup('template', 'multus-values.yaml.j2') | from_yaml }}"

- name: Deploy multus via Helm chart
  kubernetes.core.helm:
    name: "{{ multus_helm_release_name }}"
    chart_ref: "{{ multus_helm_repo_name }}/{{ multus_helm_chart_name }}"
    chart_version: "{{ multus_helm_chart_version }}"
    release_namespace: "{{ multus_namespace }}"
    create_namespace: false
    values: "{{ multus_helm_values }}"
    kubeconfig: "{{ multus_kubeconfig }}"
    state: present
    wait: true
    wait_timeout: "180s"
  register: multus_helm_result

- name: Wait for multus DaemonSet to be ready
  ansible.builtin.command: >-
    kubectl rollout status daemonset/multus -n {{ multus_namespace }} --timeout=180s
  environment:
    KUBECONFIG: "{{ multus_kubeconfig }}"
  register: multus_ready
  retries: 3
  delay: 10
  until: multus_ready.rc == 0
  changed_when: false
  when: multus_helm_result.changed  # noqa: no-handler

- name: Apply NetworkAttachmentDefinitions
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'network-attachment-definition.yaml.j2') }}"
    kubeconfig: "{{ multus_kubeconfig }}"
  loop: "{{ multus_vlan_networks }}"
  when: multus_vlan_networks | default([]) | length > 0

- name: Multus deployment summary
  ansible.builtin.debug:
    msg: |
      multus deployed successfully via Helm:
      - Chart: {{ multus_helm_repo_name }}/{{ multus_helm_chart_name }}:{{ multus_helm_chart_version }}
      - CNI conf dir: {{ multus_cni_conf_dir }}
      - CNI bin dir: {{ multus_cni_bin_dir }}
      - VLAN Networks: {{ multus_vlan_networks | map(attribute='name') | list | join(', ') if multus_vlan_networks else 'None' }}
