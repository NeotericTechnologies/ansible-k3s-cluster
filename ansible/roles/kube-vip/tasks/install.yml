---
# ansible/roles/kube-vip/tasks/install.yml
# Purpose: Install kube-vip as a DaemonSet for control-plane VIP and LoadBalancer services
# Reference: FR-011 (control-plane VIP), FR-012 (service load balancing)
# NON-NEGOTIABLE: DaemonSet mode per docs/ai-prompts/plan.md
# CONSTRAINT: No file copies to nodes — deploy via Kubernetes API only (R-013)

- name: Ensure k3s service is running on bootstrap server
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started
  when: inventory_hostname == groups['k3s_servers'][0]

- name: Validate kube-vip hardening configuration
  ansible.builtin.include_tasks: validate-config.yml

- name: Wait for local Kubernetes API port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6443
    timeout: 300
  when: inventory_hostname == groups['k3s_servers'][0]

- name: Validate Kubernetes API is ready for kube-vip bootstrap
  when: inventory_hostname == groups['k3s_servers'][0]
  block:
    - name: Wait for Kubernetes API readiness endpoint
      ansible.builtin.command: >-
        kubectl --request-timeout=10s --server https://127.0.0.1:6443 --insecure-skip-tls-verify=true get --raw=/readyz
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: kube_api_readyz
      retries: 10
      delay: 10
      until: kube_api_readyz.rc == 0
      changed_when: false

    - name: Wait for Kubernetes API discovery to become available
      ansible.builtin.command: >-
        kubectl --server https://127.0.0.1:6443 --insecure-skip-tls-verify=true api-resources --request-timeout=10s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: kube_api_discovery
      retries: 10
      delay: 10
      until: kube_api_discovery.rc == 0
      changed_when: false
  rescue:
    - name: Collect k3s service status for diagnostics
      ansible.builtin.command: systemctl status k3s --no-pager -l
      register: kube_vip_diag_systemctl
      changed_when: false
      failed_when: false

    - name: Collect recent k3s journal logs for diagnostics
      ansible.builtin.command: journalctl -u k3s -n 200 --no-pager
      register: kube_vip_diag_journal
      changed_when: false
      failed_when: false

    - name: Collect /readyz verbose output for diagnostics
      ansible.builtin.command: >-
        kubectl --request-timeout=10s --server https://127.0.0.1:6443 --insecure-skip-tls-verify=true get --raw=/readyz?verbose
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: kube_vip_diag_readyz
      changed_when: false
      failed_when: false

    - name: Print kube-vip bootstrap diagnostics
      ansible.builtin.debug:
        msg: |
          kube-vip bootstrap blocked: Kubernetes API is not ready.

          systemctl status k3s:
          {{ kube_vip_diag_systemctl.stdout | default('no output') }}

          journalctl -u k3s -n 200:
          {{ kube_vip_diag_journal.stdout | default('no output') }}

          kubectl get --raw=/readyz?verbose:
          {{ kube_vip_diag_readyz.stdout | default(kube_vip_diag_readyz.stderr | default('no output')) }}

    - name: Fail when Kubernetes API is not ready for kube-vip
      ansible.builtin.fail:
        msg: >-
          kube-vip bootstrap failed because Kubernetes API readiness/discovery checks did not succeed.
          Review the diagnostics printed above.

- name: Apply kube-vip DaemonSet via API
  kubernetes.core.k8s:
    definition: "{{ item }}"
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    host: https://127.0.0.1:6443
    validate_certs: false
  loop: "{{ lookup('template', 'kube-vip-daemonset.yaml.j2') | from_yaml_all | list }}"
  loop_control:
    label: "{{ item.kind | default('Resource') }}/{{ item.metadata.name | default('unnamed') }}"
  when:
    - inventory_hostname == groups['k3s_servers'][0]
    - item is not none
  notify: Restart kube-vip

- name: Wait for kube-vip DaemonSet to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: DaemonSet
    name: kube-vip
    namespace: kube-system
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    host: https://127.0.0.1:6443
    validate_certs: false
  register: kube_vip_ds
  retries: 30
  delay: 10
  until: >-
    (kube_vip_ds.resources | default([]) | length) > 0 and
    (kube_vip_ds.resources[0].status.numberReady | default(0) | int) ==
    (kube_vip_ds.resources[0].status.desiredNumberScheduled | default(-1) | int) and
    (kube_vip_ds.resources[0].status.desiredNumberScheduled | default(0) | int) > 0
  changed_when: false
  when: inventory_hostname == groups['k3s_servers'][0]

- name: Apply kube-vip ConfigMap via API
  kubernetes.core.k8s:
    definition: "{{ item }}"
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    host: https://127.0.0.1:6443
    validate_certs: false
  loop: "{{ lookup('template', 'kube-vip-configmap.yaml.j2') | from_yaml_all | list }}"
  loop_control:
    label: "{{ item.kind | default('Resource') }}/{{ item.metadata.name | default('unnamed') }}"
  when:
    - inventory_hostname == groups['k3s_servers'][0]
    - kube_vip_lb_enable | default(false)
    - item is not none

- name: Apply kube-vip cloud controller via API
  kubernetes.core.k8s:
    definition: "{{ item }}"
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    host: https://127.0.0.1:6443
    validate_certs: false
  loop: "{{ lookup('template', 'kube-vip-cloud-controller.yaml.j2') | from_yaml_all | list }}"
  loop_control:
    label: "{{ item.kind | default('Resource') }}/{{ item.metadata.name | default('unnamed') }}"
  when:
    - inventory_hostname == groups['k3s_servers'][0]
    - kube_vip_lb_enable | default(false)
    - item is not none

- name: Reconcile kube-vip RBAC hardening baseline
  ansible.builtin.include_tasks: reconcile-rbac.yml

- name: Verify control-plane VIP is reachable
  ansible.builtin.wait_for:
    host: "{{ control_plane_vip }}"
    port: "{{ api_port }}"
    timeout: 60
  delegate_to: localhost
  become: false
  when: inventory_hostname == groups['k3s_servers'][0]

- name: Report kube-vip hardening status
  ansible.builtin.include_tasks: report-status.yml
