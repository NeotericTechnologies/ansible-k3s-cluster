---
# ansible/roles/kube-vip/tasks/install.yml
# Purpose: Install kube-vip as a DaemonSet for control-plane VIP and LoadBalancer services
# Reference: FR-011 (control-plane VIP), FR-012 (service load balancing)
# NON-NEGOTIABLE: DaemonSet mode per docs/ai-prompts/plan.md
# CONSTRAINT: No file copies to nodes — deploy via Kubernetes API only (R-013)

- name: Validate pre-flight variables for kube-vip configurations
  ansible.builtin.assert:
    that:
      - kube_vip_enabled is defined
      - kube_vip_egress_enable is defined
      - kube_vip_service_election_enable is defined
      - kube_vip_dhcp_enable is defined
    fail_msg: "Required configurations are missing or unset."
  when: inventory_hostname == groups['k3s_servers'][0]

- name: Ensure k3s service is running on bootstrap server
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started
  when: inventory_hostname == groups['k3s_servers'][0]

- name: Wait for local Kubernetes API port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6443
    timeout: 300
  when: inventory_hostname == groups['k3s_servers'][0]

- name: Validate Kubernetes API is ready for kube-vip bootstrap
  when: inventory_hostname == groups['k3s_servers'][0]
  block:
    - name: Perform local manifest dry-run testing (T005)
      ansible.builtin.shell: >-
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl auth can-i create clusterrole --as=system:serviceaccount:kube-system:kube-vip --dry-run=client
      changed_when: false

    - name: Wait for Kubernetes API readiness endpoint
      ansible.builtin.command: >-
        kubectl --request-timeout=10s --server https://127.0.0.1:6443 --insecure-skip-tls-verify=true get --raw=/readyz
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: kube_api_readyz
      retries: 10
      delay: 10
      until: kube_api_readyz.rc == 0
      changed_when: false

    - name: Wait for Kubernetes API discovery to become available
      ansible.builtin.command: >-
        kubectl --server https://127.0.0.1:6443 --insecure-skip-tls-verify=true api-resources --request-timeout=10s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: kube_api_discovery
      retries: 10
      delay: 10
      until: kube_api_discovery.rc == 0
      changed_when: false
  rescue:
    - name: Collect k3s service status for diagnostics
      ansible.builtin.command: systemctl status k3s --no-pager -l
      register: kube_vip_diag_systemctl
      changed_when: false
      failed_when: false

    - name: Collect recent k3s journal logs for diagnostics
      ansible.builtin.command: journalctl -u k3s -n 200 --no-pager
      register: kube_vip_diag_journal
      changed_when: false
      failed_when: false

    - name: Collect /readyz verbose output for diagnostics
      ansible.builtin.command: >-
        kubectl --request-timeout=10s --server https://127.0.0.1:6443 --insecure-skip-tls-verify=true get --raw=/readyz?verbose
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: kube_vip_diag_readyz
      changed_when: false
      failed_when: false

    - name: Print kube-vip bootstrap diagnostics
      ansible.builtin.debug:
        msg: |
          kube-vip bootstrap blocked: Kubernetes API is not ready.

          systemctl status k3s:
          {{ kube_vip_diag_systemctl.stdout | default('no output') }}

          journalctl -u k3s -n 200:
          {{ kube_vip_diag_journal.stdout | default('no output') }}

          kubectl get --raw=/readyz?verbose:
          {{ kube_vip_diag_readyz.stdout | default(kube_vip_diag_readyz.stderr | default('no output')) }}

    - name: Fail when Kubernetes API is not ready for kube-vip
      ansible.builtin.fail:
        msg: >-
          kube-vip bootstrap failed because Kubernetes API readiness/discovery checks did not succeed.
          Review the diagnostics printed above.

- name: Apply kube-vip RBAC manifests via API
  kubernetes.core.k8s:
    definition: "{{ item }}"
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    host: https://127.0.0.1:6443
    validate_certs: false
  loop: "{{ lookup('template', 'kube-vip-rbac.yaml.j2') | from_yaml_all | list }}"
  loop_control:
    label: "{{ item.kind | default('Resource') }}/{{ item.metadata.name | default('unnamed') }}"
  when:
    - inventory_hostname == groups['k3s_servers'][0]
    - item is not none

- name: Retrieve dynamic cluster networking configuration
  block:
    - name: Query live cluster Pod CIDR (cluster-cidr)
      ansible.builtin.shell: >-
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl cluster-info dump | grep -m 1 cluster-cidr | tr -d '", ' | cut -d= -f2
      register: retrieved_cluster_cidr
      changed_when: false
      failed_when: retrieved_cluster_cidr.stdout | trim | length == 0

    - name: Query live cluster Service CIDR (service-cluster-ip-range)
      ansible.builtin.shell: >-
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl cluster-info dump | grep -m 1 service-cluster-ip-range | tr -d '", ' | cut -d= -f2
      register: retrieved_service_cidr
      changed_when: false
      failed_when: retrieved_service_cidr.stdout | trim | length == 0

    - name: Set dynamic cluster networking facts
      ansible.builtin.set_fact:
        dynamic_cluster_cidr: "{{ retrieved_cluster_cidr.stdout | trim }}"
        dynamic_service_cidr: "{{ retrieved_service_cidr.stdout | trim }}"
  when:
    - inventory_hostname == groups['k3s_servers'][0]

- name: Apply kube-vip DaemonSet via API
  kubernetes.core.k8s:
    definition: "{{ item }}"
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    host: https://127.0.0.1:6443
    validate_certs: false
  loop: "{{ lookup('template', 'kube-vip-daemonset.yaml.j2') | from_yaml_all | list }}"
  loop_control:
    label: "{{ item.kind | default('Resource') }}/{{ item.metadata.name | default('unnamed') }}"
  when:
    - inventory_hostname == groups['k3s_servers'][0]
    - item is not none
  notify: Restart kube-vip

- name: Wait for kube-vip DaemonSet to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: DaemonSet
    name: kube-vip
    namespace: kube-system
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    host: https://127.0.0.1:6443
    validate_certs: false
  register: kube_vip_ds
  retries: 30
  delay: 10
  until: >-
    (kube_vip_ds.resources | default([]) | length) > 0 and
    (kube_vip_ds.resources[0].status.numberReady | default(0) | int) ==
    (kube_vip_ds.resources[0].status.desiredNumberScheduled | default(-1) | int) and
    (kube_vip_ds.resources[0].status.desiredNumberScheduled | default(0) | int) > 0
  changed_when: false
  when: inventory_hostname == groups['k3s_servers'][0]

- name: Verify service election is configured in DaemonSet if enabled
  ansible.builtin.assert:
    that:
      - >-
        ('svc_election' in (lookup('template', 'kube-vip-daemonset.yaml.j2') | from_yaml_all | list | selectattr('kind', 'defined') | selectattr('kind', 'equalto', 'DaemonSet') | first).spec.template.spec.containers[0].env | map(attribute='name') | list)
    fail_msg: "svc_election environment variable missing from DaemonSet spec."
  when:
    - inventory_hostname == groups['k3s_servers'][0]
    - kube_vip_lb_enable | default(false)
    - (kube_vip_service_election_enable | default(true) | bool) or (kube_vip_egress_enable | default(true) | bool)

- name: Verify DHCP configuration mapping if enabled
  ansible.builtin.assert:
    that:
      - >-
        (lookup('template', 'kube-vip-configmap.yaml.j2') | from_yaml | list | selectattr('data', 'defined') | first).data['range-global'] == '0.0.0.0/32'
    fail_msg: "DHCP configuration mapping invalid. Missing 0.0.0.0/32 global sentinel."
  when:
    - inventory_hostname == groups['k3s_servers'][0]
    - kube_vip_lb_enable | default(false)
    - kube_vip_dhcp_enable | default(false) | bool

- name: Apply kube-vip ConfigMap via API
  kubernetes.core.k8s:
    definition: "{{ item }}"
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    host: https://127.0.0.1:6443
    validate_certs: false
  loop: "{{ lookup('template', 'kube-vip-configmap.yaml.j2') | from_yaml_all | list }}"
  loop_control:
    label: "{{ item.kind | default('Resource') }}/{{ item.metadata.name | default('unnamed') }}"
  when:
    - inventory_hostname == groups['k3s_servers'][0]
    - kube_vip_lb_enable | default(false)
    - item is not none

- name: Apply kube-vip cloud controller via API
  kubernetes.core.k8s:
    definition: "{{ item }}"
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    host: https://127.0.0.1:6443
    validate_certs: false
  loop: "{{ lookup('template', 'kube-vip-cloud-controller.yaml.j2') | from_yaml_all | list }}"
  loop_control:
    label: "{{ item.kind | default('Resource') }}/{{ item.metadata.name | default('unnamed') }}"
  when:
    - inventory_hostname == groups['k3s_servers'][0]
    - kube_vip_lb_enable | default(false)
    - item is not none

- name: Deploy configured loadbalancer and egress services via API
  kubernetes.core.k8s:
    definition: "{{ item }}"
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    host: https://127.0.0.1:6443
    validate_certs: false
  loop: "{{ lookup('template', 'kube-vip-services.yaml.j2') | from_yaml_all | list }}"
  loop_control:
    label: "{{ item.kind | default('Resource') }}/{{ item.metadata.name | default('unnamed') }}"
  when:
    - inventory_hostname == groups['k3s_servers'][0]
    - kube_vip_lb_enable | default(false)
    - kube_vip_services | default([]) | length > 0
    - item is not none

- name: Verify control-plane VIP is reachable
  ansible.builtin.wait_for:
    host: "{{ control_plane_vip }}"
    port: "{{ api_port }}"
    timeout: 60
  delegate_to: localhost
  become: false
  when: inventory_hostname == groups['k3s_servers'][0]

- name: Enforce mandatory target RBAC permissions check (T019, T020)
  block:
    - name: Audit ClusterRole services API permissions
      ansible.builtin.shell: >-
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl auth can-i update services --as=system:serviceaccount:kube-system:kube-vip
      register: rbac_services_check
      changed_when: false
      failed_when: "'yes' not in rbac_services_check.stdout"

    - name: Audit ClusterRole coordiation leases API permissions
      ansible.builtin.shell: >-
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl auth can-i create leases --as=system:serviceaccount:kube-system:kube-vip --namespace=kube-system
      register: rbac_leases_check
      changed_when: false
      failed_when: "'yes' not in rbac_leases_check.stdout"

    - name: Audit ClusterRole pods API egress permissions
      ansible.builtin.shell: >-
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl auth can-i update pods --as=system:serviceaccount:kube-system:kube-vip
      register: rbac_pods_check
      changed_when: false
      failed_when: "'yes' not in rbac_pods_check.stdout"
  when: inventory_hostname == groups['k3s_servers'][0]
