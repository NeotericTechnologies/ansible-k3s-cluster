---
# ansible/roles/kube-vip/defaults/main.yml
# Purpose: Default variables for kube-vip role
# Reference: FR-011, FR-012

kube_vip_enabled: true
kube_vip_interface: "eth0"
kube_vip_lb_enable: true

# Egress Hardening (US1)
kube_vip_egress_enable: true
# Note: Enabling egress automatically enables service election in the rendered
# DaemonSet (svc_election=true), even if kube_vip_service_election_enable is false.

# HA Service Election (US2)
kube_vip_service_election_enable: true
# Note: This toggle controls service election behavior when egress is disabled.

# DHCP LB Addressing (US3)
kube_vip_dhcp_enable: false

# Conditionally compute range based on DHCP state
kube_vip_lb_ip_range: "{{ '0.0.0.0/32' if (kube_vip_dhcp_enable | default(false) | bool) else '192.168.1.200-192.168.1.220' }}"

# Default egress service scaffolding (US1)
# This creates a baseline kube-vip-managed egress LoadBalancer Service when egress mode is enabled.
# The selected workload must exist in-cluster for traffic forwarding to function.
kube_vip_default_egress_service_enabled: "{{ kube_vip_egress_enable | default(true) | bool }}"
kube_vip_default_egress_gateway_enabled: "{{ kube_vip_default_egress_service_enabled | default(false) | bool }}"
kube_vip_default_egress_gateway_name: egress-gateway
kube_vip_default_egress_gateway_namespace: kube-system
kube_vip_default_egress_gateway_replicas: "{{ kube_vip_cloud_controller_replicas | default(1) }}"

# Gateway profile: use production-oriented squid by default.
# Set to 'agnhost' for test/demo-only profile.
kube_vip_default_egress_gateway_profile: squid
kube_vip_default_egress_gateway_profiles:
  squid:
    image: docker.io/library/squid:6.10
    port: 3128
    command:
      - /bin/sh
      - -ec
    args:
      - |
        cat >/tmp/squid.conf <<'EOF'
        http_port 3128
        acl all src 0.0.0.0/0
        http_access allow all
        cache deny all
        access_log stdio:/dev/stdout
        cache_log stdio:/dev/stderr
        pid_filename /tmp/squid.pid
        coredump_dir /tmp
        EOF
        squid -N -f /tmp/squid.conf
    run_as_non_root: false
    run_as_user: 0
    read_only_root_filesystem: false
  agnhost:
    image: registry.k8s.io/e2e-test-images/agnhost:2.54
    port: 8080
    args:
      - netexec
      - --http-port=8080
    run_as_non_root: true
    run_as_user: 65532
    read_only_root_filesystem: true

kube_vip_default_egress_gateway_profile_config: "{{ kube_vip_default_egress_gateway_profiles[kube_vip_default_egress_gateway_profile] }}"
kube_vip_default_egress_gateway_image: "{{ kube_vip_default_egress_gateway_profile_config.image }}"
kube_vip_default_egress_gateway_port: "{{ kube_vip_default_egress_gateway_profile_config.port }}"
kube_vip_default_egress_gateway_command: "{{ kube_vip_default_egress_gateway_profile_config.command | default([]) }}"
kube_vip_default_egress_gateway_args: "{{ kube_vip_default_egress_gateway_profile_config.args | default([]) }}"
kube_vip_default_egress_gateway_run_as_non_root: "{{ kube_vip_default_egress_gateway_profile_config.run_as_non_root | default(true) }}"
kube_vip_default_egress_gateway_run_as_user: "{{ kube_vip_default_egress_gateway_profile_config.run_as_user | default(65532) }}"
kube_vip_default_egress_gateway_read_only_root_filesystem: "{{ kube_vip_default_egress_gateway_profile_config.read_only_root_filesystem | default(true) }}"

# Global egress interception mode (CNI-native preferred)
# Set true to enforce cluster-wide egress interception using the selected mode.
kube_vip_global_egress_enable: false
kube_vip_global_egress_mode: cni-native
kube_vip_global_egress_cni_provider: cilium
kube_vip_global_egress_policy_name: kube-vip-global-egress
kube_vip_global_egress_destination_cidrs:
  - 0.0.0.0/0
kube_vip_global_egress_excluded_cidrs:
  - "{{ dynamic_cluster_cidr | default('10.42.0.0/16') }}"
  - "{{ dynamic_service_cidr | default('10.43.0.0/16') }}"
  - "{{ control_plane_vip }}/32"
kube_vip_global_egress_opt_out_label_key: kube-vip.io/egress-opt-out
kube_vip_global_egress_opt_out_label_value: "true"
kube_vip_global_egress_gateway_node_selector:
  kubernetes.io/hostname: "{{ groups['k3s_servers'][0] }}"
kube_vip_global_egress_egress_ip: "{{ control_plane_vip }}"

kube_vip_default_egress_service:
  name: default-egress-lb
  namespace: "{{ kube_vip_default_egress_gateway_namespace }}"
  egress_enabled: true
  external_traffic_policy: Cluster
  selector:
    app: "{{ kube_vip_default_egress_gateway_name }}"
  ports:
    - name: egress
      port: "{{ kube_vip_default_egress_gateway_port }}"
      target_port: "{{ kube_vip_default_egress_gateway_port }}"
