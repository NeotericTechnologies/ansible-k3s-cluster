---
# group_vars/all.yml
# Purpose: Cluster-wide configuration shared by all k3s nodes
# Reference: specs/001-k3s-ansible-baseline/data-model.md

# Cluster identity
cluster_name: "k3s-baseline"

# k3s version (pinned for consistent upgrades)
k3s_version: "v1.28.5+k3s1"
# HA policy target for control-plane service (3+ servers only)
k3s_server_ha_min_replicas: 3
k3s_server_non_ha_default_replicas: 1

# Control-plane access (VIP managed by kube-vip)
control_plane_vip: "192.168.1.100"
api_port: 6443

# HA mode: single-node | embedded-etcd-ha
ha_mode: "embedded-etcd-ha"

# kube-vip configuration for control-plane VIP and service load balancing
kube_vip_enabled: true
kube_vip_version: "v1.1.2"
kube_vip_cloud_provider_version: "v0.0.12"
kube_vip_ha_min_replicas: 2
kube_vip_non_ha_default_replicas: 1
kube_vip_interface: "eth0"
kube_vip_lb_enable: true
# DHCP LB Addressing (US3)
kube_vip_dhcp_enable: false
kube_vip_lb_ip_range: "{{ '0.0.0.0/32' if (kube_vip_dhcp_enable | default(false) | bool) else '192.168.1.200-192.168.1.220' }}"

# Egress Hardening (US1)
# Note: When enabled, kube-vip service election is enforced automatically in the rendered
# DaemonSet (svc_election=true), because egress services require service election.
kube_vip_egress_enable: true

# HA Service Election (US2)
# Note: This remains configurable for non-egress scenarios, but if
# kube_vip_egress_enable=true then service election is forced on.
kube_vip_service_election_enable: true

# List of Service configurations to create when LoadBalancer is enabled
kube_vip_services: []
# Example format:
# kube_vip_services:
#   - name: egress-default-lb
#     namespace: kube-system
#     external_traffic_policy: Local
#     egress_enabled: true
#     selector:
#       app: my-app
#     ports:
#       - name: http
#         port: 80
#         target_port: 80

# Add-ons enablement (deployed via cluster-addons.yml)
cert_manager_enabled: false
multus_enabled: false
rancher_enabled: false
rancher_monitoring_enabled: false
traefik_enabled: true  # k3s includes Traefik by default, role configures it
synology_csi_enabled: false

# cert-manager DNS-01 configuration (when enabled)
cert_manager_version: "v1.13.3"
cert_manager_ha_min_replicas: 2
cert_manager_non_ha_default_replicas: 1
cert_manager_email: "admin@example.com"
cert_manager_dns_provider: "cloudflare"  # Options: cloudflare, route53, etc.
cert_manager_dns_provider_credentials: {}  # Provider-specific credentials (secret)
cert_manager_staging_issuer: "letsencrypt-staging"
cert_manager_production_issuer: "letsencrypt-production"

# multus CNI configuration (when enabled)
# See ansible/roles/multus/README.md for full variable reference
multus_version: "v4.2.4-thick"
multus_ha_min_replicas: 2
multus_non_ha_default_replicas: 1
multus_dhcp_daemon_enabled: true  # Deploy DHCP daemon DaemonSet for DHCP-based IPAM
multus_dhcp_daemon_image: "alpine:3.20.3"  # Pinned image for deterministic DHCP daemon behavior
multus_cni_plugins_version: "v1.9.1"  # CNI plugins release (initContainer downloads tarball)
multus_vlan_networks: []
# Example:
# multus_vlan_networks:
#   - name: iot-vlan
#     # Must match an interface that exists on every target node.
#     # Using enp6s18 (same NIC as kube_vip_interface) avoids "Link not found" from macvlan.
#     interface: enp6s18
#     # Leave vlan_id unset unless the host already has a matching VLAN subinterface (e.g. enp6s18.10).
#     ipam_type: dhcp          # dhcp (default) | host-local | static
#
#   - name: iot-vlan-2
#     interface: eth0
#     vlan_id: 50
#     ipam_type: dhcp          # dhcp (default) | host-local | static
#
#   - name: storage-net
#     interface: eth0
#     vlan_id: 100
#     ipam_type: host-local
#     cidr: 10.100.0.0/24
#     gateway: 10.100.0.1


# Rancher configuration (when enabled)
rancher_version: "2.8.0"
rancher_ha_min_replicas: 2
rancher_non_ha_default_replicas: 1
rancher_hostname: "rancher.example.com"
rancher_ingress_class: "traefik"
rancher_tls_source: "cert-manager"

# rancher-monitoring configuration (when enabled)
rancher_monitoring_version: "103.0.3"
rancher_monitoring_ha_min_replicas: 2
rancher_monitoring_non_ha_default_replicas: 1
rancher_monitoring_retention: "7d"

# Traefik ingress configuration (Traefik app/image version, not Helm chart version)
traefik_version: "v3.5.1"
traefik_service_type: "LoadBalancer"  # Uses kube-vip for LoadBalancer services
traefik_ha_min_replicas: 2
traefik_non_ha_default_replicas: 1
traefik_entrypoints:
  - web
  - websecure

# Synology CSI configuration (when enabled)
# See ansible/roles/synology-csi/defaults/main.yml for full variable reference
synology_csi_version: "v1.2.1"
synology_csi_ha_min_replicas: 2
synology_csi_non_ha_default_replicas: 1
synology_csi_namespace: "synology-csi"
synology_csi_endpoint: ""
synology_csi_port: 8443
synology_csi_tls_verify: false
synology_csi_username: ""
synology_csi_password: ""  # Store in Ansible Vault
synology_csi_snapshots_enabled: false
synology_csi_snapshotter_version: "v8.5.0"
synology_csi_storage_classes:
  - name: "synology-iscsi-retain"
    protocol: "iscsi"
    is_default: true
    reclaim_policy: "Retain"
    volume_binding_mode: "Immediate"
    parameters:
      fsType: "ext4"
      location: "/volume1"
  - name: "synology-nfs-retain"
    protocol: "nfs"
    is_default: false
    reclaim_policy: "Retain"
    volume_binding_mode: "Immediate"
    parameters:
      location: "/volume1"

# csi-driver-nfs configuration (NFS sub-directory provisioning via kubernetes-csi/csi-driver-nfs)
# Deploys nfs.csi.k8s.io driver via Helm; creates sub-directories in a pre-existing NFS share per PVC
# See ansible/roles/synology-csi/defaults/main.yml for full variable reference
csi_nfs_enabled: false
csi_nfs_version: "v4.13.2"
csi_nfs_ha_min_replicas: 2
csi_nfs_non_ha_default_replicas: 1
csi_nfs_storage_classes:
  - name: "nfs-subdir"
    server: "{{ synology_csi_endpoint }}"
    share: "/volume1/k8s-nfs"
    is_default: false
    reclaim_policy: "Retain"
    volume_binding_mode: "Immediate"
    sub_dir: "${pv.metadata.name}"
    on_delete: "retain"
    mount_options:
      - hard
      - nfsvers=4.1

# Shared smoke/functional test image used in playbook runtime checks
smoke_test_image: "busybox:1.36.1"

# HA policy execution controls and critical subset resilience probes
ha_enable_policy_validation: true
ha_fail_on_unmet_targets: true
ha_validate_critical_subset: true
ha_run_disruption_test: false
ha_disruption_window_seconds: 600
ha_probe_requests_per_second: 1
ha_probe_min_availability_percent: 99.0

critical_component_subset:
  - k3s-control-plane
  - kube-vip
  - traefik

critical_component_probes:
  k3s-control-plane:
    url: "https://{{ control_plane_vip }}:{{ api_port }}/healthz"
    insecure: true
  kube-vip:
    url: "https://{{ control_plane_vip }}:{{ api_port }}/livez"
    insecure: true
  traefik:
    url: "http://{{ control_plane_vip }}"
    insecure: false

# =============================================================================
# Unified Upgrade Workflow Configuration
# Reference: specs/005-unified-upgrade-workflow
# =============================================================================

# Component version compatibility constraints (FR-003, FR-009)
# Each registered component MUST have an explicit entry (even if empty {})
component_compatibility:
  rancher:
    k3s_max_version: "v1.30.99+k3s99"
    k3s_min_version: "v1.27.0+k3s1"
  cert_manager:
    k3s_min_version: "v1.25.0+k3s1"
  kube_vip: {}
  traefik: {}
  multus: {}
  synology_csi: {}
  rancher_monitoring: {}

# Upgrade safety controls
allow_downgrade: false
upgrade_drain_timeout: 300
upgrade_node_ready_timeout: 300
upgrade_pause_between_nodes: 10
